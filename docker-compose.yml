version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: istays-postgres
    environment:
      POSTGRES_USER: istays
      POSTGRES_PASSWORD: istays_dev_password
      POSTGRES_DB: istays_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: istays-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
